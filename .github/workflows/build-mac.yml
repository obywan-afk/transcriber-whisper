name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller openai-whisper imageio-ffmpeg

      - name: Build Mac App
        run: |
          pyinstaller --onefile --windowed --name "WhisperTranscriber" --collect-all whisper --collect-all imageio_ffmpeg transcriber.py

      - name: Upload Mac App
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-Mac
          path: dist/WhisperTranscriber.app