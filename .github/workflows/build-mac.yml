name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller openai-whisper imageio-ffmpeg

      - name: Create temporary keychain
        env:
          CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p temp123 build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp123 build.keychain
          security import certificate.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k temp123 build.keychain

      - name: Build signed Mac App
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          pyinstaller --noconfirm --windowed \
            --name "WhisperTranscriber" \
            --icon assets/icon.icns \
            --osx-bundle-identifier "com.larsoberhofer.whispertranscriber" \
            --codesign-identity "$SIGNING_IDENTITY" \
            --collect-all whisper \
            --collect-all imageio_ffmpeg \
            transcriber_mac.py

      - name: Archive app bundle
        run: |
          ditto -c -k --keepParent "dist/WhisperTranscriber.app" "dist/WhisperTranscriber-mac.zip"

      - name: Prepare notary key
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          echo "$API_KEY_BASE64" | base64 --decode > AuthKey.p8

      - name: Notarize zip
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          xcrun notarytool submit "dist/WhisperTranscriber-mac.zip" \
            --key "AuthKey.p8" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait

      - name: Staple app
        run: |
          xcrun stapler staple "dist/WhisperTranscriber.app"
          xcrun stapler validate "dist/WhisperTranscriber.app"

      - name: Re-zip stapled app
        run: |
          ditto -c -k --keepParent "dist/WhisperTranscriber.app" "dist/WhisperTranscriber-mac-notarized.zip"

      - name: Upload notarized artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-Mac
          path: dist/WhisperTranscriber-mac-notarized.zip
