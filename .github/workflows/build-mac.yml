name: Build Mac App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    env:
      APP_NAME: WhisperTranscriber
      APP_PATH: dist/WhisperTranscriber.app
      ZIP_PATH: dist/WhisperTranscriber-mac.zip
      DMG_PATH: dist/WhisperTranscriber-mac.dmg
      KEYCHAIN_PATH: build/app-signing.keychain-db
      CERT_PATH: build/certificate.p12
      API_KEY_PATH: build/AuthKey.p8

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pyinstaller openai-whisper imageio-ffmpeg

      - name: Build Mac App
        run: |
          pyinstaller --noconfirm --windowed --name "$APP_NAME" \
            --icon assets/icon.icns \
            --osx-bundle-identifier "com.larsoberhofer.whispertranscriber" \
            --collect-all whisper \
            --collect-all imageio_ffmpeg \
            transcriber_mac.py

      - name: Prepare signing assets
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p build
          printf '%s' "$CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$API_KEY_P8_BASE64" | base64 --decode > "$API_KEY_PATH"

          security create-keychain -p "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$CERTIFICATE_PASSWORD" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -F "$SIGNING_IDENTITY"

      - name: Sign app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --options runtime --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "$APP_PATH"

          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Archive app bundle
        run: |
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Notarize app zip
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          for i in 1 2 3; do
            echo "Notarization attempt $i for $ZIP_PATH..."

            if xcrun notarytool submit "$ZIP_PATH" \
              --key "$API_KEY_PATH" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              --wait; then
              echo "Zip notarization succeeded"
              exit 0
            fi

            if [ "$i" -lt 3 ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          done

          echo "Zip notarization failed after retries"
          exit 1

      - name: Staple app bundle
        run: |
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

      - name: Re-zip stapled app
        run: |
          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          rm -rf "dist/dmg/$APP_NAME.app" "dist/dmg/Applications"
          cp -R "$APP_PATH" "dist/dmg/$APP_NAME.app"
          ln -s /Applications "dist/dmg/Applications"

          hdiutil create -volname "$APP_NAME" \
            -srcfolder dist/dmg \
            -ov -format UDZO \
            "$DMG_PATH"

      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "$DMG_PATH"

          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Notarize DMG
        env:
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          for i in 1 2 3; do
            echo "Notarization attempt $i for $DMG_PATH..."

            if xcrun notarytool submit "$DMG_PATH" \
              --key "$API_KEY_PATH" \
              --key-id "$API_KEY_ID" \
              --issuer "$API_ISSUER_ID" \
              --wait; then
              echo "DMG notarization succeeded"
              exit 0
            fi

            if [ "$i" -lt 3 ]; then
              echo "Retrying in 30 seconds..."
              sleep 30
            fi
          done

          echo "DMG notarization failed after retries"
          exit 1

      - name: Staple DMG
        run: |
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-Mac-Zip
          path: ${{ env.ZIP_PATH }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperTranscriber-Mac-DMG
          path: ${{ env.DMG_PATH }}
